name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: ユニットテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: ユニットテスト実行
        run: npm run test

  build:
    name: ビルド確認
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: Prisma クライアント生成
        run: npx prisma generate

      - name: ビルド
        run: npm run build
